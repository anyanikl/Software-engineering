<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StudPay - профиль</title>
    <link rel="stylesheet" href="css/profile.css">
</head>
<body>
    <div class="navbar">
        <h2>📚 StudPay</h2>
        <div class="nav-links">
            <a href="profile.html" class="active">Профиль</a>
            <a href="shop.html">Товары</a>
            <a href="my-listings.html">Мои объявления</a>
            <a href="favorites.html">Избранное</a>
            <a href="cart.html">Корзина</a>
            <a href="chat.html">Чаты</a>
            <a href="admin-panel.html" id="adminPanelLink" style="display: none;">Админ-панель</a>
            <button class="logout-btn" onclick="logout()">Выйти</button>
        </div>
    </div>

    <div class="container">
        <div class="profile-container">
            <div class="profile-header">
                <h2>Профиль пользователя</h2>
                <p>Управляйте своими данными</p>
                <div class="rating-display" id="ratingDisplay">
                    <span class="rating-stars" id="ratingStars">★★★★★</span>
                    <span class="rating-value" id="ratingValue">0.0</span>
                    <span class="rating-count" id="ratingCount">(0 отзывов)</span>
                </div>
            </div>

            <div class="avatar-section">
                <div class="avatar-preview" id="avatarPreview">
                    📷
                </div>

                <div class="avatar-upload" id="avatarUploadSection">
                    <input type="file" id="avatarInput" accept="image/*">
                    <label for="avatarInput" id="avatarLabel">Выбрать фото</label>
                    <button id="clearAvatarBtn" onclick="clearAvatar()" style="display: none;">🗑️ Удалить</button>
                </div>
            </div>

            <div class="profile-form">
                <div class="form-group">
                    <label for="fullNameInput">ФИО:</label>
                    <input type="text" id="fullNameInput" disabled>
                </div>

                <div class="form-group">
                    <label for="emailInput">Email:</label>
                    <input type="email" id="emailInput" disabled>
                </div>

                <div class="form-group">
                    <label for="phoneInput">Номер телефона:</label>
                    <input type="tel" id="phoneInput" disabled>
                </div>

                <div class="form-group">
                    <label for="universityInput">Университет:</label>
                    <input type="text" id="universityInput" disabled>
                </div>

                <div class="form-group">
                    <label for="facultySelect">Направление:</label>
                    <select id="facultySelect" disabled>
                        <option value="">Выберите направление</option>
                    </select>
                </div>
            </div>

            <div class="profile-actions" id="profileActions">
                <button class="edit-btn" onclick="startEdit()">Редактировать</button>
            </div>

            <div class="stats-section">
                <h3>📊 Статистика</h3>
                <div class="stats-grid" id="statsGrid">
                    <div class="stat-card">
                        <div class="stat-value" id="totalSales">0</div>
                        <div class="stat-label">Продаж</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-value" id="totalPurchases">0</div>
                        <div class="stat-label">Покупок</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-value" id="activeListings">0</div>
                        <div class="stat-label">Активных товаров</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-value" id="totalDeals">0</div>
                        <div class="stat-label">Всего сделок</div>
                    </div>
                </div>
            </div>

            <div class="reviews-section" id="reviewsSection">
                <h3>📝 Отзывы обо мне</h3>
                <div id="reviewsList"></div>
            </div>

            <div class="write-review-section" id="writeReviewSection" style="display: none;">
                <h3>✍️ Оставить отзыв</h3>
                <select id="completedDeals" class="completed-deals-select">
                    <option value="">Выберите завершенную сделку</option>
                </select>

                <div class="rating-input" id="ratingInput">
                    <span data-rating="1" onclick="setRating(1)">☆</span>
                    <span data-rating="2" onclick="setRating(2)">☆</span>
                    <span data-rating="3" onclick="setRating(3)">☆</span>
                    <span data-rating="4" onclick="setRating(4)">☆</span>
                    <span data-rating="5" onclick="setRating(5)">☆</span>
                </div>

                <textarea id="reviewText" class="review-textarea" placeholder="Напишите ваш отзыв..."></textarea>
                <button class="submit-review-btn" onclick="submitReview()">📤 Отправить отзыв</button>
            </div>
        </div>
    </div>

    <script src="js/api-config.js"></script>
    <script src="js/profile.js"></script>
</body>
</html>
