<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StudPay - избранное</title>
    <link rel="stylesheet" href="css/favorites.css">
</head>
<body>
    <div class="navbar">
        <h2>📚 StudPay</h2>
        <div class="nav-links">
            <a href="profile.html">Профиль</a>
            <a href="shop.html">Товары</a>
            <a href="my-listings.html">Мои объявления</a>
            <a href="favorites.html" class="active">Избранное</a>
            <a href="cart.html">Корзина</a>
            <a href="chat.html">Чаты</a>
            <button class="logout-btn" onclick="logout()">Выйти</button>
        </div>
    </div>

    <div class="container">
        <div class="page-header">
            <h1>Избранное</h1>
            <p>Товары, которые вам понравились</p>
        </div>

        <div class="filters-bar">
            <div class="search-box">
                <input type="text" id="searchInput" placeholder="Поиск по избранному..." oninput="filterFavorites()">
            </div>
            <div class="sort-select">
                <select id="sortFilter" onchange="filterFavorites()">
                    <option value="date_desc">Сначала новые</option>
                    <option value="date_asc">Сначала старые</option>
                    <option value="price_asc">Сначала дешевые</option>
                    <option value="price_desc">Сначала дорогие</option>
                </select>
            </div>
        </div>

        <div id="favoritesContainer" class="favorites-grid"></div>

        <div id="emptyFavorites" class="empty-favorites" style="display: none;">
            <span class="empty-icon">❤</span>
            <h3>Избранное пусто</h3>
            <p>Добавляйте товары в избранное, чтобы не потерять их</p>
            <a href="shop.html" class="shop-link">Перейти к товарам</a>
        </div>
    </div>

    <div id="productModal" class="modal">
        <div class="modal-content">
            <span class="close-modal">&times;</span>
            <img id="modalImage" class="modal-product-image" src="" alt="">
            <div class="modal-product-info">
                <h2 id="modalName" class="modal-product-name"></h2>
                <p id="modalDescription" class="modal-product-description"></p>
                <div class="modal-product-meta">
                    <span id="modalCategory" class="modal-product-category"></span>
                    <span id="modalPrice" class="modal-product-price"></span>
                </div>
                <div id="modalSeller" class="modal-product-seller"></div>
                <div class="modal-secondary-actions" id="modalSellerActions">
                    <button id="modalProfileBtn" class="modal-secondary-btn">Профиль продавца</button>
                    <button id="modalChatBtn" class="modal-secondary-btn modal-chat-btn">Написать продавцу</button>
                </div>
                <div class="modal-actions">
                    <button id="modalBuyBtn" class="modal-buy-btn">Купить</button>
                    <button id="modalRemoveBtn" class="modal-remove-btn">Удалить из избранного</button>
                </div>
            </div>
        </div>
    </div>

    <script src="js/api-config.js"></script>
    <script src="js/favorites.js"></script>
</body>
</html>
