<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StudPay - товары</title>
    <link rel="stylesheet" href="css/shop.css">
</head>
<body>
    <div class="navbar">
        <h2>📚 StudPay</h2>
        <div class="nav-links">
            <a href="profile.html">Профиль</a>
            <a href="shop.html" class="active">Товары</a>
            <a href="my-listings.html">Мои объявления</a>
            <a href="favorites.html" id="favoritesLink">Избранное</a>
            <a href="cart.html" id="cartLink">
                Корзина
                <span id="cartBadge" class="cart-badge" style="display: none;">0</span>
            </a>
            <button class="logout-btn" onclick="logout()">Выйти</button>
        </div>
    </div>

    <div class="container">
        <div class="filters-section" id="filters-section">
            <div class="search-box">
                <input type="text" id="searchInput" placeholder="Поиск по названию и описанию..." oninput="filterProducts()">
            </div>

            <div class="filter-row">
                <select id="categoryFilter" onchange="filterProducts()">
                    <option value="all">Все курсы</option>
                    <option value="1 курс">1 курс</option>
                    <option value="2 курс">2 курс</option>
                    <option value="3 курс">3 курс</option>
                    <option value="4 курс">4 курс</option>
                </select>

                <select id="typeFilter" onchange="filterProducts()">
                    <option value="all">Все типы</option>
                    <option value="лабораторные">Лабораторные</option>
                    <option value="курсовые">Курсовые</option>
                    <option value="практики">Практики</option>
                    <option value="дипломы">Дипломы</option>
                    <option value="учебники">Учебники</option>
                </select>

                <select id="sortFilter" onchange="filterProducts()">
                    <option value="date_desc">Сначала новые</option>
                    <option value="date_asc">Сначала старые</option>
                    <option value="price_asc">Сначала дешевые</option>
                    <option value="price_desc">Сначала дорогие</option>
                </select>
            </div>
        </div>

        <div id="productsContainer" class="products-grid"></div>
    </div>

    <div id="productModal" class="modal">
        <div class="modal-content">
            <span class="close-modal">&times;</span>
            <img id="modalImage" class="modal-product-image" src="" alt="">
            <div class="modal-product-info">
                <h2 id="modalName" class="modal-product-name"></h2>
                <p id="modalDescription" class="modal-product-description"></p>
                <div class="modal-product-meta">
                    <span id="modalCategory" class="modal-product-category"></span>
                    <span id="modalPrice" class="modal-product-price"></span>
                </div>
                <div id="modalSeller" class="modal-product-seller"></div>
                <div class="modal-secondary-actions" id="modalSellerActions">
                    <button id="modalProfileBtn" class="modal-secondary-btn">Профиль продавца</button>
                    <button id="modalChatBtn" class="modal-secondary-btn modal-chat-btn">Написать продавцу</button>
                </div>
                <div class="modal-actions">
                    <button id="modalBuyBtn" class="modal-buy-btn">Купить</button>
                    <button id="modalFavoriteBtn" class="modal-favorite-btn">🤍</button>
                </div>
            </div>
        </div>
    </div>

    <script src="js/api-config.js"></script>
    <script src="js/shop.js"></script>
</body>
</html>
