<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StudPay - редактировать объявление</title>
    <link rel="stylesheet" href="css/edit-listing.css">
</head>
<body>
    <div class="navbar">
        <h2>📚 StudPay</h2>
        <div class="nav-links">
            <a href="profile.html">Профиль</a>
            <a href="shop.html">Товары</a>
            <a href="my-listings.html" class="active">Мои объявления</a>
            <a href="shop.html?page=favorites">Избранное</a>
            <a href="cart.html">🛒 Корзина</a>
            <button class="logout-btn" onclick="logout()">Выйти</button>
        </div>
    </div>
    
    <div class="container">
        <div class="form-container">
            <h1>✏️ Редактировать объявление</h1>
            
            <div id="statusWarning" class="status-warning" style="display: none;">
                <p>⚠️ После редактирования объявление отправится на повторную модерацию</p>
                <small>Статус изменится на "На модерации"</small>
            </div>
            
            <form id="listingForm" onsubmit="updateListing(event)">
                <input type="hidden" id="listingId">
                
                <div class="form-group">
                    <label for="name">Название товара *</label>
                    <input type="text" id="name" required maxlength="100">
                </div>
                
                <div class="form-row">
                    <div class="form-group">
                        <label for="category">Курс *</label>
                        <select id="category" required>
                            <option value="">Выберите курс</option>
                            <option value="1 курс">1 курс</option>
                            <option value="2 курс">2 курс</option>
                            <option value="3 курс">3 курс</option>
                            <option value="4 курс">4 курс</option>
                        </select>
                    </div>
                    
                    <div class="form-group">
                        <label for="type">Тип *</label>
                        <select id="type" required>
                            <option value="">Выберите тип</option>
                            <option value="лабораторные">Лабораторные</option>
                            <option value="курсовые">Курсовые</option>
                            <option value="практики">Практики</option>
                            <option value="дипломы">Дипломы</option>
                            <option value="учебники">Учебники</option>
                        </select>
                    </div>
                </div>
                
                <div class="form-group">
                    <label for="description">Описание *</label>
                    <textarea id="description" required maxlength="1000"></textarea>
                    <div class="info-text">Максимум 1000 символов</div>
                </div>
                
                <div class="form-row">
                    <div class="form-group">
                        <label for="price">Цена (₽) *</label>
                        <input type="number" id="price" required min="0" step="1">
                    </div>
                    
                    <div class="form-group">
                        <label for="location">Местоположение *</label>
                        <input type="text" id="location" required>
                    </div>
                </div>
                
                <div class="form-group">
                    <label>Текущее фото</label>
                    <div class="current-image">
                        <img id="currentImage" src="" alt="Текущее фото">
                    </div>
                    
                    <label for="image">Заменить фото</label>
                    <div class="image-upload" onclick="document.getElementById('image').click()">
                        <input type="file" id="image" accept="image/*" onchange="previewImage(event)">
                        <label for="image" id="imageLabel">📸 Нажмите для загрузки нового фото</label>
                        <img id="imagePreview" class="image-preview" alt="Предпросмотр">
                    </div>
                    <button type="button" class="remove-image-btn" onclick="removeImage()" style="display: none;" id="removeImageBtn">🗑️ Удалить фото</button>
                </div>
                
                <div class="form-actions">
                    <button type="submit" class="submit-btn">💾 Сохранить изменения</button>
                    <button type="button" class="cancel-btn" onclick="goBack()">Отмена</button>
                </div>
            </form>
        </div>
    </div>

    <script src="js/edit-listing.js"></script>
</body>
</html>
