<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StudPay - Сброс пароля</title>
    <link rel="stylesheet" href="css/reset.css">
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="logo">🔐</div>
            <h2>Сброс пароля</h2>
            <p class="subtitle">Придумайте новый пароль</p>
        </div>
        
        <div id="errorMessage" class="error-message"></div>
        <div id="successMessage" class="success-message"></div>
        
        <div class="input-group">
            <label>Новый пароль</label>
            <div class="input-wrapper">
                <input type="password" id="newPassword" placeholder="Введите новый пароль">
                <button type="button" class="toggle-password" onclick="togglePassword('newPassword', this)">👁️</button>
            </div>
            <div class="password-strength">
                <div class="strength-text" id="strengthText">Сложность пароля</div>
                <div class="strength-bars">
                    <div class="strength-bar"></div>
                    <div class="strength-bar"></div>
                    <div class="strength-bar"></div>
                </div>
            </div>
        </div>
        
        <div class="input-group">
            <label>Подтверждение пароля</label>
            <div class="input-wrapper">
                <input type="password" id="confirmNewPassword" placeholder="Повторите пароль">
                <button type="button" class="toggle-password" onclick="togglePassword('confirmNewPassword', this)">👁️</button>
            </div>
            <div class="hint" id="matchHint"></div>
        </div>
        
        <div class="requirements">
            <div class="requirements-title">Требования к паролю</div>
            <div class="req-item" id="req-length">
                <span class="req-icon">○</span>
                <span>Минимум 8 символов</span>
            </div>
            <div class="req-item" id="req-letter">
                <span class="req-icon">○</span>
                <span>Содержит буквы</span>
            </div>
            <div class="req-item" id="req-number">
                <span class="req-icon">○</span>
                <span>Содержит цифры</span>
            </div>
        </div>
        
        <button class="btn btn-primary" onclick="submitResetPassword()">Сохранить пароль</button>
        <button class="btn btn-secondary" onclick="window.location.href='index.html'">На главную</button>
        
        <div class="footer">
            После сброса пароля вы сможете войти с новыми данными
        </div>
    </div>

    <script src="js/api-config_index.js"></script>
    <script src="js/script_index.js"></script>
    
    <script>
        function getTokenFromUrl() {
            const urlParams = new URLSearchParams(window.location.search);
            return urlParams.get('token');
        }
        
        function checkPasswordStrength(password) {
            let strength = 0;
            const checks = {
                length: password.length >= 8,
                hasLetter: /[A-Za-z]/.test(password),
                hasNumber: /[0-9]/.test(password)
            };
            
            if (checks.length) strength++;
            if (checks.hasLetter) strength++;
            if (checks.hasNumber) strength++;
            
            return { strength, checks };
        }
        
        function updateStrengthIndicator(password) {
            const { strength, checks } = checkPasswordStrength(password);
            const bars = document.querySelectorAll('.strength-bar');
            const strengthText = document.getElementById('strengthText');
            
            bars.forEach((bar, index) => {
                bar.classList.remove('weak', 'medium', 'strong');
                if (index < strength) {
                    if (strength === 1) {
                        bar.classList.add('weak');
                        strengthText.textContent = 'Слабый пароль';
                    } else if (strength === 2) {
                        bar.classList.add('medium');
                        strengthText.textContent = 'Средний пароль';
                    } else if (strength === 3) {
                        bar.classList.add('strong');
                        strengthText.textContent = 'Сильный пароль';
                    }
                }
            });
            
            if (password.length === 0) {
                strengthText.textContent = 'Сложность пароля';
            }
            
            updateRequirement('req-length', checks.length);
            updateRequirement('req-letter', checks.hasLetter);
            updateRequirement('req-number', checks.hasNumber);
        }
        
        function updateRequirement(id, isValid) {
            const element = document.getElementById(id);
            if (element) {
                if (isValid) {
                    element.classList.add('valid');
                    element.querySelector('.req-icon').textContent = '✓';
                } else {
                    element.classList.remove('valid');
                    element.querySelector('.req-icon').textContent = '○';
                }
            }
        }
        
        function checkPasswordsMatch() {
            const password = document.getElementById('newPassword').value;
            const confirm = document.getElementById('confirmNewPassword').value;
            const hint = document.getElementById('matchHint');
            
            if (confirm.length > 0) {
                if (password === confirm) {
                    hint.textContent = '✓ Пароли совпадают';
                    hint.style.color = '#10b981';
                } else {
                    hint.textContent = '✗ Пароли не совпадают';
                    hint.style.color = '#ef4444';
                }
            } else {
                hint.textContent = '';
            }
        }
        
        function togglePassword(fieldId, button) {
            const field = document.getElementById(fieldId);
            if (field.type === 'password') {
                field.type = 'text';
                button.textContent = '🙈';
            } else {
                field.type = 'password';
                button.textContent = '👁️';
            }
        }
        
        async function submitResetPassword() {
            const token = getTokenFromUrl();
            const newPassword = document.getElementById('newPassword').value;
            const confirmPassword = document.getElementById('confirmNewPassword').value;
            
            if (!newPassword || !confirmPassword) {
                showError('Заполните все поля');
                return;
            }
            
            if (newPassword !== confirmPassword) {
                showError('Пароли не совпадают');
                return;
            }
            
            const { checks } = checkPasswordStrength(newPassword);
            if (!checks.length || !checks.hasLetter || !checks.hasNumber) {
                showError('Пароль должен содержать минимум 8 символов, буквы и цифры');
                return;
            }
            
            if (!token) {
                showError('Недействительная ссылка для сброса пароля');
                return;
            }
            
            // Используем функцию resetPassword из script_index.js
            const success = await resetPassword(token, newPassword, confirmPassword);
            if (success) {
                setTimeout(() => {
                    window.location.href = 'index.html';
                }, 2000);
            }
        }
        
        function showError(message) {
            const errorDiv = document.getElementById('errorMessage');
            errorDiv.textContent = '❌ ' + message;
            errorDiv.style.display = 'block';
            setTimeout(() => {
                errorDiv.style.display = 'none';
            }, 5000);
        }
        
        function showSuccess(message) {
            const successDiv = document.getElementById('successMessage');
            successDiv.textContent = '✅ ' + message;
            successDiv.style.display = 'block';
            setTimeout(() => {
                successDiv.style.display = 'none';
            }, 5000);
        }
        
        document.addEventListener('DOMContentLoaded', function() {
            const token = getTokenFromUrl();
            if (!token) {
                showError('Отсутствует токен сброса пароля');
            }
            
            const passwordField = document.getElementById('newPassword');
            const confirmField = document.getElementById('confirmNewPassword');
            
            passwordField.addEventListener('input', function() {
                updateStrengthIndicator(this.value);
                checkPasswordsMatch();
            });
            
            confirmField.addEventListener('input', checkPasswordsMatch);
            
            document.addEventListener('keypress', function(e) {
                if (e.key === 'Enter') {
                    submitResetPassword();
                }
            });
        });
    </script>
</body>
</html>
