<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StudPay - Сброс пароля</title>
    <link rel="stylesheet" href="css/reset-password.css">
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="logo">🔐</div>
            <h2>Сброс пароля</h2>
            <p class="subtitle">Придумайте новый пароль</p>
        </div>
        
        <div id="errorMessage" class="error-message"></div>
        <div id="successMessage" class="success-message"></div>
        
        <div class="input-group">
            <label>Новый пароль</label>
            <div class="input-wrapper">
                <input type="password" id="newPassword" placeholder="Введите новый пароль">
                <button type="button" class="toggle-password" onclick="window.togglePassword('newPassword', this)">👁️</button>
            </div>
            <div class="password-strength">
                <div class="strength-text" id="strengthText">Сложность пароля</div>
                <div class="strength-bars">
                    <div class="strength-bar"></div>
                    <div class="strength-bar"></div>
                    <div class="strength-bar"></div>
                </div>
            </div>
        </div>
        
        <div class="input-group">
            <label>Подтверждение пароля</label>
            <div class="input-wrapper">
                <input type="password" id="confirmNewPassword" placeholder="Повторите пароль">
                <button type="button" class="toggle-password" onclick="window.togglePassword('confirmNewPassword', this)">👁️</button>
            </div>
            <div class="hint" id="matchHint"></div>
        </div>
        
        <div class="requirements">
            <div class="requirements-title">Требования к паролю</div>
            <div class="req-item" id="req-length">
                <span class="req-icon">○</span>
                <span>Минимум 8 символов</span>
            </div>
            <div class="req-item" id="req-letter">
                <span class="req-icon">○</span>
                <span>Содержит буквы</span>
            </div>
            <div class="req-item" id="req-number">
                <span class="req-icon">○</span>
                <span>Содержит цифры</span>
            </div>
        </div>
        
        <button class="btn btn-primary" onclick="window.submitResetPassword()">Сохранить пароль</button>
        <button class="btn btn-secondary" onclick="window.location.href='index.html'">На главную</button>
        
        <div class="footer">
            После сброса пароля вы сможете войти с новыми данными
        </div>
    </div>

    <script src="js/reset-password.js"></script>
</body>
</html>
