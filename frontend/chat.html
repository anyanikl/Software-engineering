<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StudPay - Чат</title>
    <link rel="stylesheet" href="css/chat.css">
</head>
<body>
    <div class="navbar">
        <h2>📚 StudPay</h2>
        <div class="nav-links">
            <a href="profile.html">Профиль</a>
            <a href="shop.html">Товары</a>
            <a href="my-listings.html">Мои объявления</a>
            <a href="shop.html?page=favorites">Избранное</a>
            <a href="cart.html">🛒 Корзина</a>
            <a href="chat.html" class="active">💬 Чаты</a>
            <button class="logout-btn" onclick="logout()">Выйти</button>
        </div>
    </div>
    
    <div class="container">
        <div class="chats-sidebar">
            <div class="chats-header">
                <h3>💬 Мои чаты</h3>
            </div>
            <div id="chatsList">
                <!-- Список чатов загружается динамически -->
            </div>
        </div>
        
        <div class="chat-main" id="chatMain">
            <div class="no-chat-selected" id="noChatSelected">
                <span style="font-size: 48px;">💬</span>
                <p>Выберите чат для начала общения</p>
            </div>
        </div>
    </div>

    <script src="js/chat.js"></script>
</body>
</html>
